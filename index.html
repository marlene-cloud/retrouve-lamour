// ─── HELPERS ─────────────────────────────────────────────────────────────────

function calcAttachment(ans) {
  const scores = { anxieux: 0, evitant: 0, secure: 0, desorganise: 0 };
  const map = {
    6:  ["anxieux", "evitant", "secure", "desorganise"],
    7:  ["anxieux", "evitant", "secure", "desorganise"],
    8:  ["anxieux", "evitant", "secure", "desorganise"],
    9:  ["anxieux", "evitant", "secure", "desorganise"],
    11: ["anxieux", "evitant", "secure", "desorganise"],
  };
  for (const [k, arr] of Object.entries(map)) {
    const v = ans[+k];
    if (typeof v === "number" && v >= 0 && v < arr.length) scores[arr[v]]++;
  }
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  return sorted[0][0];
}

function calcPhase(ans) {
  const pain = ans[2] ?? 5;
  const time = ans[1] ?? 2;
  if (pain >= 7 || time === 0) return "comprendre";
  if (pain >= 4 || time === 1) return "guerir";
  if (pain >= 2) return "construire";
  return "saimer";
}

function findPhaseId(exoId) {
  for (const [pid, exos] of Object.entries(EXOS)) {
    if (exos.find(e => e.id === exoId)) return pid;
  }
  return "comprendre";
}

function ChoiceList({ opts, ans, onPick }) {
  return (

        <button
          key={i} onClick={() => onPick(i)}

}

function MultiList({ step, ans, onPick }) {
  const selected = ans || [];
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
      <div style={{ fontSize: 12, color: "#8B7060", marginBottom: 4 }}>Choisis jusqu'à {step.max}</div>

        const sel = selected.includes(i);
        return (
          <button
            key={i}
            onClick={() => {
              if (sel) onPick(selected.filter(x => x !== i));
              else if (selected.length < step.max) onPick([...selected, i]);
            }}
            style={{
              padding: "14px 18px", borderRadius: 12, fontSize: 14,
              fontFamily: "Georgia, serif", cursor: "pointer", textAlign: "left",
              display: "flex", alignItems: "center", gap: 10,

            }}

            </span>

          </button>

      })}

}

function YesNo({ ans, onPick }) {

    <div style={{ display: "flex", gap: 12 }}>

function AgreeList({ ans, onPick }) {
  const opts = ["Oui, c'est vrai", "Plutôt oui", "Plutôt non", "Non, pas encore"];
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>

function StepView({ step, ans, setAns }) {
  if (!step) return null;
  if (step.type === "coach") {
    return (
      <div style={{ background: "#FFF0EB", borderRadius: 16, padding: "20px 24px", borderLeft: "3px solid #E8705A" }}>
        <div style={{ fontSize: 11, color: "#E8705A", letterSpacing: 1, textTransform: "uppercase", marginBottom: 8 }}>Ton coach</div>
        <p style={{ fontSize: 15, color: "#1A1A1A", lineHeight: 1.9, margin: 0, fontStyle: "italic" }}>{step.text}</p>
      </div>
    );
  }
  if (step.type === "textarea") {
    return (
      <div>
        <textarea
          value={ans || ""}
          onChange={e => setAns(e.target.value)}
          placeholder="Écris ici, librement et honnêtement..."
          rows={6}
          style={{ width: "100%", background: "#fff", border: "1px solid #EDD5CC", borderRadius: 12, padding: "16px", fontSize: 14, fontFamily: "Georgia, serif", color: "#1A1A1A", resize: "none", lineHeight: 1.8, boxSizing: "border-box", outline: "none" }}
        />
      </div>
    );
  }
  if (step.type === "choice" || step.type === "belief") {
    return <ChoiceList opts={step.opts} ans={ans} onPick={setAns} />;
  }
  if (step.type === "multicheck") {
    return <MultiList step={{ ...step, max: step.max, opts: step.opts }} ans={ans} onPick={setAns} />;
  }
  if (step.type === "qcm" || step.type === "scenario" || step.type === "limit") {
    return <ChoiceList opts={step.opts} ans={ans} onPick={setAns} />;
  }
  if (step.type === "scale") {
    return <ScaleInput value={ans} onChange={setAns} minL={step.minL} maxL={step.maxL} />;
  }
  if (step.type === "multi") {
    return <MultiList step={step} ans={ans} onPick={setAns} />;
  }
  if (step.type === "yesno") {
    return <YesNo ans={ans} onPick={setAns} />;
  }
  if (step.type === "agree") {
    return <AgreeList ans={ans} onPick={setAns} />;
  }
  return null;
}

function canAnswer(step, ans) {
  if (!step) return false;
  if (step.type === "coach") return true;
  if (step.type === "textarea") return ans && ans.trim().length > 5;
  if (step.type === "choice" || step.type === "belief") return ans !== undefined;
  if (step.type === "multicheck") return ans && ans.length > 0;
  if (step.type === "scale") return ans !== undefined;
  if (step.type === "multi") return ans && ans.length > 0;
  if (step.type === "yesno" || step.type === "agree") return ans !== undefined;
  return ans !== undefined;
}

            { icon: "◉", title: "Coach IA personnel", desc: "Disponible à tout moment, bienveillant et direct" },
          ].map((f, i) => (
            <div key={i} className={`fade-up-${i+2}`} style={{ display: "flex", gap: 16, marginBottom: 24, alignItems: "flex-start" }}>
              <div style={{ width: 40, height: 40, borderRadius: 12, background: "var(--coral-light)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, color: "var(--coral)", fontSize: 16 }}>{f.icon}</div>
              <div>
                <div style={{ fontFamily: "var(--font-display)", fontSize: 18, fontWeight: 500, color: "var(--dark)", marginBottom: 4 }}>{f.title}</div>
                <div style={{ fontSize: 13, color: "var(--mid)", lineHeight: 1.6, fontWeight: 300 }}>{f.desc}</div>
              </div>
            </div>
          ))}
        </div>

        {/* CTA */}
        <div style={{ padding: "0 24px 52px" }}>
          <button onClick={() => setScreen("diagnostic")}
            style={{ width: "100%", padding: "18px", borderRadius: 14, fontSize: 14, fontFamily: "var(--font-body)", fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", cursor: "pointer", border: "none", background: "var(--coral)", color: "#fff", boxShadow: "0 8px 24px rgba(232,112,90,0.35)" }}>
            Commencer mon diagnostic
          </button>
          <p style={{ textAlign: "center", fontSize: 12, color: "var(--mid)", marginTop: 12, fontWeight: 300 }}>Confidentiel · Bienveillant · Transformateur</p>
        </div>
      </div>
    );
  }

  // ─── DIAGNOSTIC ──────────────────────────────────────────────────────────

  if (screen === "diagnostic") {
    return (
      <div style={{ ...PAGE, display: "flex", flexDirection: "column", minHeight: "100vh" }}>
        <div style={{ padding: "48px 24px 0" }}>
          <button
            onClick={() => dStep > 0 ? setDStep(s => s - 1) : setScreen("onboarding")}
            style={BTN_GHOST}
          >← Retour</button>

          <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 24 }}>
            <div style={{ flex: 1, background: "#EDD5CC", borderRadius: 99, height: 4, overflow: "hidden" }}>
              <div style={{ width: `${((dStep + 1) / DIAG.length) * 100}%`, height: "100%", background: "#E8705A", borderRadius: 99, transition: "width 0.4s" }} />
            </div>
            <span style={{ fontSize: 12, color: "#8B7060", flexShrink: 0 }}>{dStep + 1}/{DIAG.length}</span>
          </div>

          <div style={{ display: "inline-block", padding: "5px 14px", borderRadius: 99, background: currQ.sec === "A" ? "#FDF0EC" : "#FFF0EB", marginBottom: 16 }}>
            <span style={{ fontSize: 11, color: currQ.sec === "A" ? "#C4574A" : "#E8705A", letterSpacing: 1 }}>
              {currQ.sec === "A" ? "🌱 La relation passée" : "🧠 Style d'attachement"}
            </span>
          </div>

          {currQ.type === "scenario" && (
            <div style={{ fontSize: 11, color: "#8B7060", letterSpacing: 1, textTransform: "uppercase", marginBottom: 8 }}>Scénario</div>
          )}

          <h2 style={{ fontFamily: "var(--font-display)", fontSize: 22, fontWeight: 400, color: "var(--dark)", lineHeight: 1.55, marginBottom: 28 }}>{currQ.q}</h2>

          {(currQ.type === "qcm" || currQ.type === "scenario") && (
            <ChoiceList opts={currQ.opts} ans={dAns[currQ.id]} onPick={setDA} />
          )}
          {currQ.type === "scale" && (
            <ScaleInput value={dAns[currQ.id]} onChange={setDA} minL={currQ.minL} maxL={currQ.maxL} />
          )}
          {currQ.type === "multi" && (
            <MultiList step={currQ} ans={dAns[currQ.id]} onPick={setDA} />
          )}
        </div>

        <div style={{ flex: 1 }} />
        <div style={{ padding: "24px 24px 52px" }}>
          <button
            onClick={dNext} disabled={!dCanNext()}
            style={{ ...BTN_PRIMARY, background: dCanNext() ? "#1A1A1A" : "#EDD5CC", color: dCanNext() ? "#F5EDE6" : "#A09090", cursor: dCanNext() ? "pointer" : "default" }}
          >
            {dStep < DIAG.length - 1 ? "Question suivante →" : "Voir mes résultats →"}
          </button>
        </div>
      </div>
    );
  }

  // ─── RESULTS ─────────────────────────────────────────────────────────────

  if (screen === "results" && results) {
    const att = ATTACH[results.attachment];
    const ph  = PHASES.find(p => p.id === results.phase);
    return (
      <div style={{ ...PAGE, paddingBottom: 60 }}>
        <div style={{ background: att.bg, padding: "52px 24px 32px", textAlign: "center" }}>
          <div style={{ fontSize: 52 }}>{att.emoji}</div>
          <div style={{ marginTop: 12, fontSize: 11, letterSpacing: 2, color: att.color, textTransform: "uppercase" }}>Ton profil d'attachement</div>
          <h2 style={{ fontFamily: "var(--font-display)", fontSize: 30, fontWeight: 300, color: "var(--dark)", margin: "8px 0 0", fontStyle: "italic" }}>{att.label}</h2>
        </div>
        <div style={{ padding: 24 }}>
          <div style={{ background: "#fff", borderRadius: 16, padding: "20px 24px", border: "1px solid #EDD5CC", marginBottom: 16 }}>
            <p style={{ fontSize: 14, color: "#1A1A1A", lineHeight: 1.9, margin: 0 }}>{att.desc}</p>
          </div>
          <div style={{ background: "#fff", borderRadius: 16, padding: "20px 24px", border: "1px solid #EDD5CC", marginBottom: 24 }}>
            <div style={{ fontSize: 11, color: "#8B7060", letterSpacing: 2, textTransform: "uppercase", marginBottom: 14 }}>Ton point de départ recommandé</div>
            <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
              <div style={{ width: 48, height: 48, borderRadius: 12, background: ph.bg, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 24 }}>{ph.emoji}</div>
              <div>
                <div style={{ fontSize: 16, color: "#1A1A1A" }}>{ph.title}</div>
                <div style={{ fontSize: 13, color: "#8B7060", marginTop: 3 }}>{ph.sub}</div>
              </div>
            </div>
          </div>
          <button onClick={() => setScreen("home")} style={BTN_PRIMARY}>Commencer mon parcours →</button>
        </div>
      </div>
    );
  }

  // ─── HOME ─────────────────────────────────────────────────────────────────

  if (screen === "home") {
    return (
      <div style={{ ...PAGE, paddingBottom: 80 }}>
        {/* Header */}
        <div style={{ background: "var(--dark)", padding: "52px 24px 28px", position: "relative", overflow: "hidden" }}>
          <div style={{ position: "absolute", top: -40, right: -40, width: 120, height: 120, borderRadius: "50%", background: "rgba(232,112,90,0.1)" }} />
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
            <div>
              <div style={{ fontSize: 10, letterSpacing: 3, color: "var(--coral)", textTransform: "uppercase", fontWeight: 700, marginBottom: 8 }}>Ton parcours</div>
              <h1 style={{ fontFamily: "var(--font-display)", fontSize: 34, fontWeight: 300, color: "#fff", lineHeight: 1.2 }}>Bienvenue<span style={{ color: "var(--coral)", fontStyle: "italic" }}>.</span></h1>
            </div>
            <button onClick={() => { if(window.confirm("Recommencer depuis le début ?")) { localStorage.clear(); setResults(null); setCompleted(new Set()); setScreen("onboarding"); }}} style={{ background: "rgba(255,255,255,0.1)", border: "none", fontSize: 10, color: "rgba(255,255,255,0.5)", cursor: "pointer", borderRadius: 8, padding: "6px 10px", fontFamily: "var(--font-body)", letterSpacing: 1 }}>RESET</button>
          </div>
          {/* Progress bar */}
          <div style={{ marginTop: 24 }}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
              <span style={{ fontSize: 12, color: "rgba(255,255,255,0.5)", fontWeight: 300 }}>{completed.size} / {totalExos} exercices</span>
              <span style={{ fontSize: 20, fontFamily: "var(--font-display)", fontWeight: 400, color: "var(--coral)" }}>{progress}%</span>
            </div>
            <div style={{ background: "rgba(255,255,255,0.1)", borderRadius: 99, height: 4, overflow: "hidden" }}>
              <div style={{ width: `${progress}%`, height: "100%", background: "var(--coral)", borderRadius: 99, transition: "width 0.8s ease" }} />
            </div>
          </div>
        </div>

        <div style={{ padding: "0 24px" }}>
          <div style={{ fontSize: 11, letterSpacing: 2, color: "#8B7060", textTransform: "uppercase", marginBottom: 16 }}>Les 3 étapes</div>
          {PHASES.map((ph, i) => {
            const done   = EXOS[ph.id].filter(e => completed.has(e.id)).length;
            const isReco = results?.phase === ph.id;
            return (
              <div key={ph.id} onClick={() => setScreen("phase-" + ph.id)}
                style={{ background: "#fff", borderRadius: 16, padding: "18px 20px", marginBottom: 12, border: isReco ? `1.5px solid ${ph.color}` : "1px solid #EDD5CC", cursor: "pointer", display: "flex", alignItems: "center", gap: 14 }}>
                <div style={{ width: 48, height: 48, borderRadius: 12, background: ph.bg, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22, flexShrink: 0 }}>{ph.emoji}</div>
                <div style={{ flex: 1 }}>
                  {isReco && <div style={{ fontSize: 10, color: ph.color, letterSpacing: 1, marginBottom: 3 }}>★ RECOMMANDÉ POUR TOI</div>}
                  <div style={{ fontSize: 11, color: ph.color, letterSpacing: 1, textTransform: "uppercase", marginBottom: 2 }}>Étape {i + 1}</div>
                  <div style={{ fontSize: 15, color: "#1A1A1A" }}>{ph.title}</div>
                  <div style={{ fontSize: 12, color: "#8B7060", marginTop: 2 }}>{done}/{EXOS[ph.id].length} exercices</div>
                </div>
                <div style={{ color: "#D0B8AE", fontSize: 20 }}>›</div>
              </div>
            );
          })}
        </div>

        <div style={{ padding: "20px 24px 0" }}>
          <button onClick={() => setScreen("coach")}
            style={{ ...BTN_CORAL, display: "flex", alignItems: "center", justifyContent: "center", gap: 10 }}>
            <span style={{ fontSize: 16 }}>◎</span> Parler à ton coach IA
          </button>
        </div>

        {completed.size === totalExos && (
          <div style={{ margin: "16px 24px 0", background: "linear-gradient(135deg, #1A1A1A 0%, #3A1F14 100%)", borderRadius: 16, padding: "24px", textAlign: "center" }}>
            <div style={{ fontSize: 32, marginBottom: 12 }}>🌸</div>
            <div style={{ fontSize: 11, color: "#D4574A", letterSpacing: 2, textTransform: "uppercase", marginBottom: 8 }}>Parcours complet</div>
            <div style={{ fontSize: 18, color: "#F5EDE6", fontWeight: 400, marginBottom: 8, lineHeight: 1.4 }}>Tu as tout traversé.</div>
            <div style={{ fontSize: 13, color: "#8B7060", lineHeight: 1.7, marginBottom: 20 }}>Ton bilan final et la lettre de ton coach t'attendent.</div>
            <button onClick={generateFinalBilan} style={{ background: "#D4574A", color: "#fff", border: "none", borderRadius: 12, padding: "14px 24px", fontSize: 14, fontFamily: "Georgia, serif", cursor: "pointer" }}>
              Voir mon bilan final →
            </button>
          </div>
        )}
      </div>
    );
  }

  // ─── PHASE ────────────────────────────────────────────────────────────────

  const activePhase = PHASES.find(p => screen === "phase-" + p.id);
  if (activePhase) {
    return (
      <div style={{ ...PAGE, paddingBottom: 60 }}>
        <div style={{ background: activePhase.bg, padding: "48px 24px 32px" }}>
          <button onClick={() => setScreen("home")} style={{ ...BTN_GHOST, color: activePhase.color }}>← Retour</button>
          <div style={{ fontSize: 36 }}>{activePhase.emoji}</div>
          <h2 style={{ fontSize: 26, fontWeight: 400, color: "#1A1A1A", margin: "12px 0 8px" }}>{activePhase.title}</h2>
          <p style={{ fontSize: 14, color: "#8B7060", margin: 0 }}>{activePhase.sub}</p>
        </div>
        <div style={{ padding: 24 }}>
          {EXOS[activePhase.id].map(ex => {
            const done = completed.has(ex.id);
            return (
              <div key={ex.id} onClick={() => { setExo(ex); setEStep(0); setEAns({}); setScreen("exercise"); }}
                style={{ background: "#fff", borderRadius: 16, padding: "18px 20px", marginBottom: 12, border: done ? `1.5px solid ${activePhase.color}` : "1px solid #EDD5CC", cursor: "pointer" }}>
                <div style={{ display: "flex", alignItems: "flex-start", gap: 14 }}>
                  <div style={{ width: 26, height: 26, borderRadius: 99, background: done ? activePhase.color : "#F0E0D8", border: done ? "none" : "1.5px solid #D0B8AE", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", marginTop: 2 }}>
                    {done && <span style={{ color: "#fff", fontSize: 11 }}>✓</span>}
                  </div>
                  <div>
                    <div style={{ fontSize: 15, color: "#1A1A1A", marginBottom: 4 }}>{ex.title}</div>
                    <div style={{ fontSize: 13, color: "#8B7060", lineHeight: 1.6 }}>{ex.intro.substring(0, 75)}…</div>
                    <div style={{ fontSize: 12, color: activePhase.color, marginTop: 6 }}>{ex.steps.length} étapes</div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  // ─── EXERCISE ─────────────────────────────────────────────────────────────

  if (screen === "exercise" && exo) {
    const pId    = findPhaseId(exo.id);
    const ph     = PHASES.find(p => p.id === pId);
    const phColor = ph?.color || "#E8705A";
    return (
      <div style={{ ...PAGE, display: "flex", flexDirection: "column", minHeight: "100vh" }}>
        <div style={{ padding: "48px 24px 0" }}>
          <button onClick={() => { setExo(null); setScreen("phase-" + pId); }} style={BTN_GHOST}>
            ← {exo.title}
          </button>
          <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 20 }}>
            <div style={{ flex: 1, background: "#EDD5CC", borderRadius: 99, height: 4, overflow: "hidden" }}>
              <div style={{ width: `${(eStep / exo.steps.length) * 100}%`, height: "100%", background: phColor, borderRadius: 99, transition: "width 0.4s" }} />
            </div>
            <span style={{ fontSize: 12, color: "#8B7060", flexShrink: 0 }}>{eStep + 1}/{exo.steps.length}</span>
          </div>
          {eStep === 0 && (
            <div style={{ background: "#FAF9F7", borderRadius: 12, padding: "14px 18px", marginBottom: 20, borderLeft: `3px solid ${phColor}` }}>
              <p style={{ fontSize: 13, color: "#8B7060", lineHeight: 1.7, margin: 0 }}>{exo.intro}</p>
            </div>
          )}
          <h3 style={{ fontFamily: "var(--font-display)", fontSize: 20, fontWeight: 400, color: "var(--dark)", lineHeight: 1.6, marginBottom: 24 }}>{curStep?.q}</h3>
          <StepView step={curStep} ans={curAns} setAns={v => setEAns(p => ({ ...p, [eStep]: v }))} />
        </div>
        <div style={{ flex: 1 }} />
        <div style={{ padding: "24px 24px 52px" }}>
          <button
            onClick={eNext} disabled={!eCanNext()}
            style={{ ...BTN_PRIMARY, background: eCanNext() ? phColor : "#EDD5CC", color: eCanNext() ? "#fff" : "#A09090", cursor: eCanNext() ? "pointer" : "default" }}
          >
            {curStep && curStep.type === "coach" ? "J'ai lu →" : eStep < exo.steps.length - 1 ? "Étape suivante →" : "Terminer l'exercice ✓"}
          </button>
        </div>
      </div>
    );
  }

  // ─── EXO RESULT ───────────────────────────────────────────────────────────

  if (screen === "exo-result" && exo) {
    const pId = findPhaseId(exo.id);
    const ph  = PHASES.find(p => p.id === pId);
    const phColor = ph?.color || "#E8705A";
    return (
      <div style={{ ...PAGE, paddingBottom: 60 }}>
        <div style={{ padding: "48px 24px 24px" }}>
          <button onClick={() => { setExo(null); setScreen("phase-" + pId); }} style={BTN_GHOST}>← Retour</button>
          <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 8 }}>
            <div style={{ width: 40, height: 40, borderRadius: 12, background: ph?.bg, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20 }}>{ph?.emoji}</div>
            <div>
              <div style={{ fontSize: 11, color: phColor, letterSpacing: 1, textTransform: "uppercase" }}>Exercice complété</div>
              <div style={{ fontSize: 17, color: "#1A1A1A" }}>{exo.title}</div>
            </div>
          </div>
        </div>

        {analysisLoading && (
          <div style={{ margin: "0 24px", background: "#fff", borderRadius: 16, padding: "32px 24px", border: "1px solid #EDD5CC", textAlign: "center" }}>
            <div style={{ fontSize: 28, marginBottom: 16 }}>🌿</div>
            <div style={{ fontSize: 14, color: "#8B7060", lineHeight: 1.8 }}>
              Ton coach analyse tes réponses…
            </div>
            <div style={{ marginTop: 16, display: "flex", justifyContent: "center", gap: 6 }}>
              {[0,1,2].map(i => (
                <div key={i} style={{ width: 8, height: 8, borderRadius: 99, background: phColor, opacity: 0.4, animation: `pulse ${0.8 + i * 0.2}s ease-in-out infinite` }} />
              ))}
            </div>
          </div>
        )}

        {analysis && !analysisLoading && (
          <div style={{ padding: "0 24px", display: "flex", flexDirection: "column", gap: 14 }}>

            {/* Titre + Analyse */}
            <div style={{ background: "#fff", borderRadius: 16, padding: "22px 24px", border: "1px solid #EDD5CC" }}>
              <div style={{ fontSize: 11, color: phColor, letterSpacing: 2, textTransform: "uppercase", marginBottom: 10 }}>Ce que tes réponses révèlent</div>
              <div style={{ fontSize: 18, fontWeight: 400, color: "#1A1A1A", marginBottom: 14, lineHeight: 1.4 }}>{analysis.titre}</div>
              <p style={{ fontSize: 14, color: "#3A2820", lineHeight: 1.9, margin: 0 }}>{analysis.analyse}</p>
            </div>

            {/* Force */}
            <div style={{ background: ph?.bg || "#FDF0EC", borderRadius: 16, padding: "20px 24px", border: `1px solid ${phColor}22` }}>
              <div style={{ display: "flex", alignItems: "flex-start", gap: 12 }}>
                <div style={{ fontSize: 22, flexShrink: 0 }}>💪</div>
                <div>
                  <div style={{ fontSize: 11, color: phColor, letterSpacing: 2, textTransform: "uppercase", marginBottom: 8 }}>Ta force visible</div>
                  <p style={{ fontSize: 14, color: "#1A1A1A", lineHeight: 1.8, margin: 0 }}>{analysis.force}</p>
                </div>
              </div>
            </div>

            {/* Conseil */}
            <div style={{ background: "#fff", borderRadius: 16, padding: "20px 24px", border: "1px solid #EDD5CC" }}>
              <div style={{ display: "flex", alignItems: "flex-start", gap: 12 }}>
                <div style={{ fontSize: 22, flexShrink: 0 }}>🎯</div>
                <div>
                  <div style={{ fontSize: 11, color: "#8B7060", letterSpacing: 2, textTransform: "uppercase", marginBottom: 8 }}>Ton conseil pour cette semaine</div>
                  <p style={{ fontSize: 14, color: "#1A1A1A", lineHeight: 1.8, margin: 0 }}>{analysis.conseil}</p>
                </div>
              </div>
            </div>

            {/* Affirmation */}
            <div style={{ background: "#1A1A1A", borderRadius: 16, padding: "24px", textAlign: "center" }}>
              <div style={{ fontSize: 11, color: "#8B7060", letterSpacing: 2, textTransform: "uppercase", marginBottom: 14 }}>Ton affirmation du jour</div>
              <p style={{ fontSize: 17, color: "#F5EDE6", lineHeight: 1.7, margin: 0, fontStyle: "italic" }}>"{analysis.affirmation}"</p>
            </div>

          </div>
        )}

        <div style={{ padding: "24px 24px 0", display: "flex", flexDirection: "column", gap: 12 }}>
          <button onClick={() => { setExo(null); setScreen("phase-" + pId); }} style={BTN_PRIMARY}>
            Continuer le parcours
          </button>
          <button onClick={() => { setExo(null); setScreen("coach"); }}
            style={{ ...BTN_PRIMARY, background: "transparent", border: "1px solid #EDD5CC", color: "#8B7060" }}>
            En parler au coach IA
          </button>
        </div>
      </div>
    );
  }

  // ─── FIN DU PARCOURS ──────────────────────────────────────────────────────

  if (screen === "fin-parcours") {
    return (
      <div style={{ ...PAGE, paddingBottom: 80 }}>
        <div style={{ background: "#1A1A1A", padding: "52px 24px 40px", textAlign: "center" }}>
          <button onClick={() => setScreen("home")} style={{ ...BTN_GHOST, color: "#8B7060", marginBottom: 28 }}>← Retour</button>
          <div style={{ fontSize: 48, marginBottom: 16 }}>🌸</div>
          <div style={{ fontSize: 11, color: "#D4574A", letterSpacing: 3, textTransform: "uppercase", marginBottom: 12 }}>Bilan final</div>
          {finalLoading ? (
            <div style={{ fontSize: 16, color: "#F5EDE6", lineHeight: 1.6 }}>Ton coach prépare ton bilan…</div>
          ) : finalBilan ? (
            <h2 style={{ fontSize: 26, fontWeight: 400, color: "#F5EDE6", margin: 0, lineHeight: 1.3 }}>{finalBilan.titre}</h2>
          ) : null}
        </div>

        {finalLoading && (
          <div style={{ padding: "40px 24px", textAlign: "center" }}>
            <div style={{ display: "flex", justifyContent: "center", gap: 8, marginBottom: 16 }}>
              {[0,1,2].map(i => (
                <div key={i} style={{ width: 10, height: 10, borderRadius: 99, background: "#D4574A", opacity: 0.4 }} />
              ))}
            </div>
            <p style={{ fontSize: 13, color: "#8B7060", lineHeight: 1.8 }}>Quelques instants…<br />Ton coach lit tout ce que tu as traversé.</p>
          </div>
        )}

        {finalBilan && !finalLoading && (
          <div style={{ padding: "28px 24px 0", display: "flex", flexDirection: "column", gap: 14 }}>

            {/* Intro */}
            <div style={{ background: "#fff", borderRadius: 16, padding: "22px 24px", border: "1px solid #EDD5CC" }}>
              <div style={{ fontSize: 11, color: "#8B7060", letterSpacing: 2, textTransform: "uppercase", marginBottom: 12 }}>Ce que tu as accompli</div>
              <p style={{ fontSize: 15, color: "#1A1A1A", lineHeight: 1.9, margin: "0 0 14px" }}>{finalBilan.intro}</p>
              <p style={{ fontSize: 14, color: "#3A2820", lineHeight: 1.9, margin: 0 }}>{finalBilan.chemin}</p>
            </div>

            {/* Transformation */}
            <div style={{ background: "#FDF0EC", borderRadius: 16, padding: "20px 24px", border: "1px solid #EDD5CC" }}>
              <div style={{ display: "flex", gap: 12, alignItems: "flex-start" }}>
                <div style={{ fontSize: 22, flexShrink: 0 }}>🦋</div>
                <div>
                  <div style={{ fontSize: 11, color: "#D4574A", letterSpacing: 2, textTransform: "uppercase", marginBottom: 8 }}>Ta transformation</div>
                  <p style={{ fontSize: 14, color: "#1A1A1A", lineHeight: 1.85, margin: 0 }}>{finalBilan.transformation}</p>
                </div>
              </div>
            </div>

            {/* Signes que tu es prêt(e) */}
            <div style={{ background: "#fff", borderRadius: 16, padding: "20px 24px", border: "1px solid #EDD5CC" }}>
              <div style={{ fontSize: 11, color: "#C4574A", letterSpacing: 2, textTransform: "uppercase", marginBottom: 14 }}>🌱 Tu es prêt·e quand…</div>
              <p style={{ fontSize: 14, color: "#1A1A1A", lineHeight: 1.9, margin: 0 }}>{finalBilan.prete}</p>
            </div>

            {/* Lettre du coach */}
            <div style={{ background: "#FFF0EB", borderRadius: 16, padding: "24px", border: "1px solid #EDD5CC" }}>
              <div style={{ fontSize: 11, color: "#E8705A", letterSpacing: 2, textTransform: "uppercase", marginBottom: 16 }}>💌 La lettre de ton coach</div>
              <p style={{ fontSize: 15, color: "#1A1A1A", lineHeight: 2, margin: 0, fontStyle: "italic" }}>{finalBilan.lettre}</p>
            </div>

            {/* Affirmation finale */}
            <div style={{ background: "#1A1A1A", borderRadius: 16, padding: "24px", textAlign: "center" }}>
              <div style={{ fontSize: 11, color: "#D4574A", letterSpacing: 2, textTransform: "uppercase", marginBottom: 14 }}>Ton affirmation pour l'amour</div>
              <p style={{ fontSize: 18, color: "#F5EDE6", lineHeight: 1.6, margin: 0, fontStyle: "italic" }}>"{finalBilan.affirmation}"</p>
            </div>

            {/* ─── SECTION POUR ALLER PLUS LOIN ─── */}
            <div style={{ marginTop: 8, padding: "20px 0 0" }}>
              <div style={{ fontSize: 11, letterSpacing: 3, color: "#8B7060", textTransform: "uppercase", marginBottom: 6 }}>Pour aller plus loin</div>
              <h3 style={{ fontSize: 22, fontWeight: 400, color: "#1A1A1A", margin: "0 0 20px", lineHeight: 1.3 }}>Ton prochain partenaire idéal</h3>
            </div>

            {/* Profil idéal */}
            <div style={{ background: "#fff", borderRadius: 16, padding: "22px 24px", border: "1.5px solid #D4574A" }}>
              <div style={{ display: "flex", gap: 12, alignItems: "flex-start" }}>
                <div style={{ fontSize: 22, flexShrink: 0 }}>💛</div>
                <div>
                  <div style={{ fontSize: 11, color: "#D4574A", letterSpacing: 2, textTransform: "uppercase", marginBottom: 10 }}>Le profil fait pour toi</div>
                  <p style={{ fontSize: 14, color: "#1A1A1A", lineHeight: 1.9, margin: 0 }}>{finalBilan.profil_ideal}</p>
                </div>
              </div>
            </div>

            {/* Compatibilités */}
            <div style={{ background: "#FDF0EC", borderRadius: 16, padding: "20px 24px", border: "1px solid #EDD5CC" }}>
              <div style={{ fontSize: 11, color: "#C4574A", letterSpacing: 2, textTransform: "uppercase", marginBottom: 14 }}>✓ Ce qui est compatible avec toi</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {(finalBilan.compatibilites || []).map((item, i) => (
                  <div key={i} style={{ display: "flex", alignItems: "flex-start", gap: 12 }}>
                    <div style={{ width: 22, height: 22, borderRadius: 99, background: "#C4574A", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, marginTop: 1 }}>
                      <span style={{ color: "#fff", fontSize: 11 }}>✓</span>
                    </div>
                    <span style={{ fontSize: 14, color: "#1A1A1A", lineHeight: 1.6 }}>{item}</span>
                  </div>
                ))}
              </div>
            </div>

            {/* Incompatibles */}
            <div style={{ background: "#FFF0EB", borderRadius: 16, padding: "20px 24px", border: "1px solid #EDD5CC" }}>
              <div style={{ fontSize: 11, color: "#E8705A", letterSpacing: 2, textTransform: "uppercase", marginBottom: 14 }}>⚠ Ce qui ne fonctionne pas avec toi</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {(finalBilan.incompatibles || []).map((item, i) => (
                  <div key={i} style={{ display: "flex", alignItems: "flex-start", gap: 12 }}>
                    <div style={{ width: 22, height: 22, borderRadius: 99, background: "#E8705A", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, marginTop: 1 }}>
                      <span style={{ color: "#fff", fontSize: 13, lineHeight: 1 }}>✕</span>
                    </div>
                    <span style={{ fontSize: 14, color: "#1A1A1A", lineHeight: 1.6 }}>{item}</span>
                  </div>
                ))}
              </div>
            </div>

            {/* Réglages personnels */}
            <div style={{ background: "#fff", borderRadius: 16, padding: "20px 24px", border: "1px solid #EDD5CC" }}>
              <div style={{ fontSize: 11, color: "#8B7060", letterSpacing: 2, textTransform: "uppercase", marginBottom: 16 }}>⚙ Tes réglages pour la prochaine relation</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
                {(finalBilan.reglages || []).map((r, i) => (
                  <div key={i} style={{ paddingLeft: 14, borderLeft: "3px solid #EDD5CC" }}>
                    <div style={{ fontSize: 14, color: "#1A1A1A", fontWeight: 500, marginBottom: 4 }}>{r.titre}</div>
                    <div style={{ fontSize: 13, color: "#8B7060", lineHeight: 1.7 }}>{r.desc}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* CTA final */}
            <div style={{ background: "#1A1A1A", borderRadius: 16, padding: "28px 24px", textAlign: "center" }}>
              <div style={{ fontSize: 28, marginBottom: 12 }}>🌸</div>
              <p style={{ fontSize: 15, color: "#F5EDE6", lineHeight: 1.7, margin: "0 0 20px", fontStyle: "italic" }}>"{finalBilan.affirmation}"</p>
              <button onClick={() => setScreen("coach")} style={{ background: "#D4574A", color: "#fff", border: "none", borderRadius: 12, padding: "14px 24px", fontSize: 14, fontFamily: "Georgia, serif", cursor: "pointer" }}>
                Parler au coach IA 💬
              </button>
            </div>

          </div>
        )}
      </div>
    );
  }

  // ─── COACH ────────────────────────────────────────────────────────────────

  if (screen === "coach") {
    return (
      <div style={{ ...PAGE, display: "flex", flexDirection: "column", height: "100vh" }}>
        <div style={{ padding: "48px 24px 16px", borderBottom: "1px solid #EDD5CC", background: "#fff", flexShrink: 0 }}>
          <button onClick={() => setScreen("home")} style={BTN_GHOST}>← Retour</button>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <div style={{ width: 40, height: 40, borderRadius: 99, background: "#FDF0EC", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18 }}>🌿</div>
            <div>
              <div style={{ fontSize: 15, color: "#1A1A1A" }}>Coach</div>
              <div style={{ fontSize: 12, color: "#8B7060" }}>IA · disponible maintenant</div>
            </div>
          </div>
        </div>

        <div style={{ flex: 1, padding: "20px 24px", overflowY: "auto", display: "flex", flexDirection: "column", gap: 14 }}>
          {msgs.map((m, i) => (
            <div key={i} style={{ display: "flex", justifyContent: m.role === "user" ? "flex-end" : "flex-start" }}>
              <div style={{
                maxWidth: "82%", fontSize: 14, lineHeight: 1.85, padding: "14px 18px",
                background: m.role === "user" ? "#1A1A1A" : "#fff",
                color: m.role === "user" ? "#F5EDE6" : "#1A1A1A",
                border: m.role === "assistant" ? "1px solid #EDD5CC" : "none",
                borderRadius: m.role === "user" ? "16px 16px 4px 16px" : "16px 16px 16px 4px",
              }}>{m.content}</div>
            </div>
          ))}
          {chatLoading && (
            <div style={{ display: "flex" }}>
              <div style={{ background: "var(--white)", border: "1px solid var(--cream-dark)", borderRadius: "16px 16px 16px 4px", padding: "16px 20px" }}>
              <div className="dot-pulse"><span/><span/><span/></div>
            </div>
            </div>
          )}
          <div ref={chatRef} />
        </div>

        <div style={{ padding: "16px 24px 36px", background: "#fff", borderTop: "1px solid #EDD5CC", flexShrink: 0 }}>
          <div style={{ display: "flex", gap: 10, alignItems: "flex-end" }}>
            <textarea
              value={chatIn}
              onChange={e => setChatIn(e.target.value)}
              onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendChat(); } }}
              placeholder="Écris ce que tu ressens…"
              rows={2}
              style={{ flex: 1, background: "#F5EDE7", border: "1px solid #EDD5CC", borderRadius: 12, padding: "12px 16px", fontSize: 14, fontFamily: "Georgia, serif", resize: "none", outline: "none", color: "#1A1A1A", lineHeight: 1.6 }}
            />
            <button
              onClick={sendChat}
              disabled={chatLoading || !chatIn.trim()}
              style={{ background: "#E8705A", color: "#fff", border: "none", borderRadius: 12, width: 44, height: 44, fontSize: 18, cursor: "pointer", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", opacity: (!chatIn.trim() || chatLoading) ? 0.4 : 1 }}
            >↑</button>
          </div>
        </div>
      </div>
    );
  }

  return null;
}


const domRoot = ReactDOM.createRoot(document.getElementById('root'));
domRoot.render(<App />);
</script>
</body>
</html>
